<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%" shape-rendering="crispEdges">
  <!--
    "Restful" variant of 09-flame-glitch-loop.svg:
    - 8-second total loop (was 5s)
    - 5s of pure idle (no glitch — the S sits calm)
    - ~0.5s glitch burst in the middle of the period
    - ~2.5s of post-burst idle before loop restart

    Same chromatic-aberration glitch language as the original (red +
    cyan layers offset with stepped translate), just compressed into
    a single eye-catching burst surrounded by stillness.
  -->
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="2" height="2">
      <rect width="2" height="1" fill="#000000" fill-opacity="0.18"/>
    </pattern>
    <radialGradient id="halo" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#d787ff" stop-opacity="0.30"/>
      <stop offset="70%" stop-color="#005fff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#005fff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="screen-clip"><rect width="32" height="32" rx="6"/></clipPath>
  </defs>

  <g clip-path="url(#screen-clip)">
    <rect width="32" height="32" fill="#22253D"/>

    <!-- ── Red chromatic-aberration layer (offset left during glitch) ── -->
    <g opacity="0">
      <g fill="#ff5050">
        <rect x="7" y="3.5" width="3" height="5"/><rect x="10" y="3.5" width="3" height="5"/>
        <rect x="13" y="3.5" width="3" height="5"/><rect x="16" y="3.5" width="3" height="5"/>
        <rect x="19" y="3.5" width="3" height="5"/><rect x="22" y="3.5" width="3" height="5"/>
        <rect x="25" y="3.5" width="3" height="5"/>
        <rect x="4" y="8.5" width="3" height="5"/><rect x="7" y="8.5" width="3" height="5"/>
        <rect x="7" y="13.5" width="3" height="5"/><rect x="10" y="13.5" width="3" height="5"/>
        <rect x="13" y="13.5" width="3" height="5"/><rect x="16" y="13.5" width="3" height="5"/>
        <rect x="19" y="13.5" width="3" height="5"/><rect x="22" y="13.5" width="3" height="5"/>
        <rect x="25" y="13.5" width="3" height="5"/>
        <rect x="22" y="18.5" width="3" height="5"/><rect x="25" y="18.5" width="3" height="5"/>
        <rect x="4" y="23.5" width="3" height="5"/><rect x="7" y="23.5" width="3" height="5"/>
        <rect x="10" y="23.5" width="3" height="5"/><rect x="13" y="23.5" width="3" height="5"/>
        <rect x="16" y="23.5" width="3" height="5"/><rect x="19" y="23.5" width="3" height="5"/>
        <rect x="22" y="23.5" width="3" height="5"/><rect x="25" y="23.5" width="3" height="5"/>
      </g>
      <!-- 5s idle (0→62.5%) · glitch burst 62.5%→68.75% (~0.5s) · 2.5s idle (→100%) -->
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
               keyTimes="0;0.625;0.640;0.655;0.670;0.6875;1"
               values="0;0;0.85;0.85;0.85;0;0"
               calcMode="discrete"/>
      <animateTransform attributeName="transform" type="translate"
               dur="8s" repeatCount="indefinite"
               keyTimes="0;0.625;0.640;0.655;0.670;0.6875;1"
               values="0,0;0,0;-2,0;1,0;-1.5,0;0,0;0,0"
               calcMode="discrete"/>
    </g>

    <!-- ── Cyan chromatic-aberration layer (offset right during glitch) ── -->
    <g opacity="0">
      <g fill="#50c8ff">
        <rect x="7" y="3.5" width="3" height="5"/><rect x="10" y="3.5" width="3" height="5"/>
        <rect x="13" y="3.5" width="3" height="5"/><rect x="16" y="3.5" width="3" height="5"/>
        <rect x="19" y="3.5" width="3" height="5"/><rect x="22" y="3.5" width="3" height="5"/>
        <rect x="25" y="3.5" width="3" height="5"/>
        <rect x="4" y="8.5" width="3" height="5"/><rect x="7" y="8.5" width="3" height="5"/>
        <rect x="7" y="13.5" width="3" height="5"/><rect x="10" y="13.5" width="3" height="5"/>
        <rect x="13" y="13.5" width="3" height="5"/><rect x="16" y="13.5" width="3" height="5"/>
        <rect x="19" y="13.5" width="3" height="5"/><rect x="22" y="13.5" width="3" height="5"/>
        <rect x="25" y="13.5" width="3" height="5"/>
        <rect x="22" y="18.5" width="3" height="5"/><rect x="25" y="18.5" width="3" height="5"/>
        <rect x="4" y="23.5" width="3" height="5"/><rect x="7" y="23.5" width="3" height="5"/>
        <rect x="10" y="23.5" width="3" height="5"/><rect x="13" y="23.5" width="3" height="5"/>
        <rect x="16" y="23.5" width="3" height="5"/><rect x="19" y="23.5" width="3" height="5"/>
        <rect x="22" y="23.5" width="3" height="5"/><rect x="25" y="23.5" width="3" height="5"/>
      </g>
      <animate attributeName="opacity" dur="8s" repeatCount="indefinite"
               keyTimes="0;0.625;0.640;0.655;0.670;0.6875;1"
               values="0;0;0.85;0.85;0.85;0;0"
               calcMode="discrete"/>
      <animateTransform attributeName="transform" type="translate"
               dur="8s" repeatCount="indefinite"
               keyTimes="0;0.625;0.640;0.655;0.670;0.6875;1"
               values="0,0;0,0;2,0;-1,0;1.5,0;0,0;0,0"
               calcMode="discrete"/>
    </g>

    <!-- ── Main S-flame (always visible, never glitches) ── -->
    <g fill="#ffffff">
      <rect x="7"  y="3.5" width="3" height="5"/><rect x="10" y="3.5" width="3" height="5"/>
      <rect x="13" y="3.5" width="3" height="5"/><rect x="16" y="3.5" width="3" height="5"/>
      <rect x="19" y="3.5" width="3" height="5"/><rect x="22" y="3.5" width="3" height="5"/>
      <rect x="25" y="3.5" width="3" height="5"/>
    </g>
    <g fill="#d787ff">
      <rect x="4" y="8.5" width="3" height="5"/><rect x="7" y="8.5" width="3" height="5"/>
    </g>
    <g fill="#8787ff">
      <rect x="7"  y="13.5" width="3" height="5"/><rect x="10" y="13.5" width="3" height="5"/>
      <rect x="13" y="13.5" width="3" height="5"/><rect x="16" y="13.5" width="3" height="5"/>
      <rect x="19" y="13.5" width="3" height="5"/><rect x="22" y="13.5" width="3" height="5"/>
      <rect x="25" y="13.5" width="3" height="5"/>
    </g>
    <g fill="#875fff">
      <rect x="22" y="18.5" width="3" height="5"/><rect x="25" y="18.5" width="3" height="5"/>
    </g>
    <g fill="#005fff">
      <rect x="4"  y="23.5" width="3" height="5"/><rect x="7"  y="23.5" width="3" height="5"/>
      <rect x="10" y="23.5" width="3" height="5"/><rect x="13" y="23.5" width="3" height="5"/>
      <rect x="16" y="23.5" width="3" height="5"/><rect x="19" y="23.5" width="3" height="5"/>
      <rect x="22" y="23.5" width="3" height="5"/>
    </g>

    <!-- ── CRT scanline overlay ── -->
    <rect width="32" height="32" fill="url(#scan)"/>
  </g>
</svg>
